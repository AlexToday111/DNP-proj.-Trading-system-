services:

  # ======================== Infrastructure ========================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trading_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ======================== Backend ========================

  trading-core:
    build:
      context: ./backend/java/trading-core
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/trading_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP: trading-core
      KAFKA_MARKET_DATA_TOPIC: market-data
      KAFKA_SIGNALS_TOPIC: signals
      KAFKA_ORDERS_TOPIC: orders
      KAFKA_EXECUTION_RESULT_TOPIC: execution-result

  market-data-service:
    build:
      context: ./backend/golang/market-data-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_MARKET_DATA_TOPIC: market-data
      KAFKA_CLIENT_ID: market-data-service
      MARKET_DATA_CSV_PATH: testdata/market_data.csv
      MARKET_DATA_REPLAY_INTERVAL_MS: 1000
      MARKET_DATA_LOOP_REPLAY: "true"

  execution-sim-service:
    build:
      context: ./backend/golang/execution-sim-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_MARKET_DATA_TOPIC: market-data
      KAFKA_ORDERS_TOPIC: orders
      KAFKA_EXECUTION_RESULT_TOPIC: execution-result
      MARKET_DATA_EXPIRATION_SEC: 60
      KAFKA_MARKET_DATA_TOPIC_GROUP_ID: exec-sim-market-data
      KAFKA_ORDERS_TOPIC_GROUP_ID: exec-sim-orders

  # ======================== Frontend ========================

  frontend:
    build:
      context: ./frontend
    depends_on:
      - trading-core
    ports:
      - "3000:80"

volumes:
  pgdata:
