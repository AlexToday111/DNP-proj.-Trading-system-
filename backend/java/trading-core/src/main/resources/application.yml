spring:
  application:
    name: trading-core
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/trading_core}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:trading-core}
      auto-offset-reset: earliest

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  kafka:
    topics:
      market-data: ${KAFKA_MARKET_DATA_TOPIC:market-data}
      signals: ${KAFKA_SIGNALS_TOPIC:signals}
      orders: ${KAFKA_ORDERS_TOPIC:orders}
      execution-result: ${KAFKA_EXECUTION_RESULT_TOPIC:${KAFKA_EXECUTION_RESULTS_TOPIC:execution-result}}
