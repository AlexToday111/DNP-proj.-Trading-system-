spring:
  application:
    name: strategy-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:strategy-service}
      auto-offset-reset: earliest

app:
  kafka:
    topics:
      market-data: ${KAFKA_MARKET_DATA_TOPIC:market-data}
      signals: ${KAFKA_SIGNALS_TOPIC:signals}
  strategy:
    signal-quantity: ${STRATEGY_SIGNAL_QUANTITY:1}
